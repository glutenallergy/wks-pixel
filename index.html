<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WKS Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: 'Space Mono', ui-monospace, monospace;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
    }
    .tabbar {
      flex: none;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 46px;
      padding: 0 14px;
      background: #000;
      border-bottom: 1px solid #262626;
    }
    .tabbar .brand {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #ededed;
      margin-right: 18px;
    }
    .tab {
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.02em;
      padding: 7px 16px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: #141414;
      color: #8a8a8a;
      cursor: pointer;
      transition: all 0.12s;
    }
    .tab:hover { color: #ededed; border-color: #3a3a3a; }
    .tab.active { background: #15f2fe; color: #001416; border-color: #15f2fe; }
    .frames { position: relative; flex: 1; min-height: 0; }
    .frames iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
    }
    .frames iframe.active { display: block; }
  </style>
</head>
<body>
  <nav class="tabbar">
    <span class="brand">WKS GRID</span>
    <button class="tab" data-target="frame-v1">Grid Engine</button>
    <button class="tab active" data-target="frame-v2">Image → Grid</button>
  </nav>
  <div class="frames">
    <iframe id="frame-v1" title="WKS Grid Engine"></iframe>
    <iframe id="frame-v2" class="active" src="./v2.html" title="WKS Image → Grid"></iframe>
  </div>
  <script>
    (function () {
      var tabs = Array.prototype.slice.call(document.querySelectorAll('.tab'));
      var frames = {
        'frame-v1': document.getElementById('frame-v1'),
        'frame-v2': document.getElementById('frame-v2'),
      };
      var srcs = { 'frame-v1': './v1.html' }; // lazy-loaded on first activation
      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          var target = tab.getAttribute('data-target');
          // Lazy-load a frame the first time it's shown
          if (srcs[target] && !frames[target].getAttribute('src')) {
            frames[target].setAttribute('src', srcs[target]);
          }
          tabs.forEach(function (t) { t.classList.toggle('active', t === tab); });
          Object.keys(frames).forEach(function (id) {
            frames[id].classList.toggle('active', id === target);
          });
        });
      });
    })();
  </script>
</body>
</html>
